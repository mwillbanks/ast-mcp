# The build script passes the CLI entry to Bun programmatically.
entry = ["bin/ast-mcp.ts"]

# Generated host-install surfaces are runtime copies, not source entry points.
ignorePatterns = [".github/hooks/**", ".github/skills/**"]

# Fumadocs generates the collections alias during documentation builds.
# ast-bro and dprint are runtime CLI dependencies resolved from the stable package installation.
ignoreDependencies = ["@ast-bro/cli", "collections", "dprint"]

[duplicates]
# Focus the gate on broadly repeated copy-paste rather than contextual pairs and triples.
minOccurrences = 4

[rules]
# Legacy external-interface suppressions are retained for compatibility with Fallow's
# inability to model MCP Transport dispatch.
stale-suppressions = "off"
