# Fumadocs generates the collections alias during documentation builds.
# dprint supplies the platform-specific native package copied into distributions.
ignoreDependencies = ["collections", "dprint"]

[duplicates]
# Focus the gate on broadly repeated copy-paste rather than contextual pairs and triples.
minOccurrences = 4

[rules]
# Legacy external-interface suppressions are retained for compatibility with Fallow's
# inability to model MCP Transport dispatch.
stale-suppressions = "off"
