name: Deploy documentation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag to document; leave empty for a manual main deployment"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_ref || github.ref }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun ci --cwd website
      - name: Lint documentation
        run: bun run --cwd website lint
      - name: Typecheck documentation
        run: bun run --cwd website typecheck
      - name: Test documentation
        run: bun run --cwd website test
      - name: Build static documentation
        env:
          VITE_BASE_PATH: /ast-mcp/
        run: bun run --cwd website build
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: website/.output/public
          include-hidden-files: true

  deploy:
    needs: build
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
