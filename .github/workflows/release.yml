name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_sha == github.sha }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: bun ci
      - name: Install ast-bro for Linux
        run: |
          cargo install ast-bro --version 3.0.0 --locked
          echo "AST_BRO_BINARY=$HOME/.cargo/bin/ast-bro" >> "$GITHUB_ENV"
      - run: bun run check
      - run: bun run skill:check
      - run: bun run evals:check
      - run: bun run build
      - run: npm publish --access public --provenance --ignore-scripts
