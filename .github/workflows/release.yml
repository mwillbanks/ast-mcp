name: Release

on:
  workflow_call:

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.release.outputs.tag_name }}
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.17.0
      - run: bun ci
      - name: Restore ast-bro binary
        id: ast-bro-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: ~/.cache/ast-bro/3.0.0
          key: ast-bro-v1-3.0.0-${{ runner.os }}-${{ runner.arch }}
      - name: Install ast-bro for Linux
        if: steps.ast-bro-cache.outputs.cache-hit != 'true'
        run: |
          cargo install ast-bro --version 3.0.0 --locked --root "$HOME/.cache/ast-bro/3.0.0"
      - name: Save ast-bro binary
        if: steps.ast-bro-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6.1.0
        with:
          path: ~/.cache/ast-bro/3.0.0
          key: ast-bro-v1-3.0.0-${{ runner.os }}-${{ runner.arch }}
      - name: Configure ast-bro
        run: echo "AST_BRO_BINARY=$HOME/.cache/ast-bro/3.0.0/bin/ast-bro" >> "$GITHUB_ENV"
      - run: bun run check
      - run: bun run skill:check
      - run: bun run evals:check
      - run: bun run build
      - run: npm publish --access public --provenance --ignore-scripts
