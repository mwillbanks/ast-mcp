version: 2
updates:
  - package-ecosystem: "bun"
    directories:
      - "/"
      - "/website"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      minor-and-patch:
        update-types:
          - "patch"
          - "minor"
